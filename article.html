<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DECODING_SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <style>
        :root { --bg: #080808; --text: #d1d1d1; --dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter'; line-height: 1.8; margin: 0; }
        #progress { position: fixed; top: 0; left: 0; height: 2px; background: #fff; width: 0%; z-index: 2000; transition: width 0.1s; }
        nav { padding: 25px 40px; border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(20px); position: sticky; top: 0; background: rgba(8,8,8,0.8); z-index: 1000; }
        nav a { color: var(--dim); text-decoration: none; font-size: 11px; font-family: 'Fira Code'; letter-spacing: 1px; }
        nav a:hover { color: #fff; }
        .content { max-width: 800px; margin: 80px auto; padding: 0 24px; }
        .markdown-body h1 { font-size: 42px; margin-bottom: 40px; letter-spacing: -2px; color: #fff; }
        .markdown-body pre { background: #000 !important; padding: 25px; border: 1px solid #1a1a1a; border-radius: 12px; }
        .markdown-body code { font-family: 'Fira Code'; font-size: 14px; background: #1a1a1a; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="progress"></div>
    <nav><a href="index.html"><- BACK_TO_TERMINAL</a></nav>
    <main class="content">
        <div id="render-content" class="markdown-body">LOADING_DATA...</div>
    </main>
    <script>
        const GITHUB_USER = '194268'; const REPO_NAME = 'SYC';
        const urlParams = new URLSearchParams(window.location.search);
        const postName = urlParams.get('post');
        if (postName) {
            fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/posts/${postName}`)
                .then(res => res.text())
                .then(md => {
                    document.getElementById('render-content').innerHTML = marked.parse(md);
                    hljs.highlightAll();
                });
        }
        window.onscroll = () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress").style.width = (winScroll / height) * 100 + "%";
        };
    </script>
</body>
</html>
