name: Auto Update Index

on:
  push:
    paths:
      - 'posts/**' # 只有当 posts 文件夹内容变化时才触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update list.json
        run: python update_index.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add list.json
          git commit -m "auto: update article index [skip ci]" || echo "No changes to commit"
          git push
